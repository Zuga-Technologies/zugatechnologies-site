name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Run script tests
        run: pnpm test:scripts
      - name: Validate Astro schemas
        run: pnpm astro check
      - name: Validate Mike-review aggregator (no empty drafts)
        run: pnpm build:bible-review
      - name: Build the bible site
        run: pnpm build
